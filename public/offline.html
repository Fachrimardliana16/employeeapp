<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0ea5e9">
  <title>Tidak Ada Koneksi — Portal Pegawai</title>
  <link rel="icon" href="/images/icons/icon-72x72.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 50%, #075985 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #f0f9ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.25rem;
    }
    h1 { font-size: 1.375rem; font-weight: 700; color: #0f172a; margin-bottom: 0.75rem; }
    p { color: #64748b; font-size: 0.9rem; line-height: 1.6; margin-bottom: 2rem; }
    .logo { width: 60px; height: 60px; border-radius: 12px; margin: 0 auto 1rem; display: block; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      justify-content: center;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 1.5rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .online .dot { background: #22c55e; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/images/icons/icon-128x128.png" alt="Logo" class="logo">
    <div class="icon">📡</div>
    <h1>Tidak Ada Koneksi Internet</h1>
    <p>Anda sedang offline. Pastikan koneksi internet Anda aktif, lalu coba muat ulang halaman.</p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Coba Lagi
    </button>
    <div class="status" id="statusBar">
      <div class="dot"></div>
      <span id="statusText">Offline</span>
    </div>
  </div>
  <script>
    function updateStatus() {
      const bar = document.getElementById('statusBar');
      const text = document.getElementById('statusText');
      if (navigator.onLine) {
        bar.classList.add('online');
        text.textContent = 'Koneksi aktif — mengalihkan...';
        setTimeout(() => window.location.href = '/mobile', 1500);
      } else {
        bar.classList.remove('online');
        text.textContent = 'Offline';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
